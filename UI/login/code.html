<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CyberGuard Pro - Secure Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1173d4",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings:
            'FILL' 0,
            'wght' 400,
            'GRAD' 0,
            'opsz' 24;
            font-size: 24px;
        }
    </style>
</head>
<body class="font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-hidden">
<div class="absolute inset-0 z-0">
<div class="absolute inset-0 bg-gradient-to-br from-primary/10 via-transparent to-primary/10"></div>
</div>
<div class="relative layout-container flex h-full grow flex-col items-center justify-center p-4 sm:p-6 lg:p-8">
<div class="layout-content-container flex w-full max-w-md flex-col items-center gap-6">
<div class="flex flex-col items-center gap-4 text-center">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-4xl">shield</span>
<h1 class="text-3xl font-bold text-white">CyberGuard Pro</h1>
</div>
</div>
<div class="flex w-full flex-col gap-8 rounded-xl bg-background-light/5 dark:bg-background-dark/50 p-6 sm:p-8 backdrop-blur-sm border border-white/5">
<div class="flex flex-col gap-2 text-center">
<p class="text-white text-3xl font-bold leading-tight tracking-tight font-display">Secure Login</p>
<p class="text-slate-400 dark:text-slate-400 text-base font-normal leading-normal">Protecting your digital world.</p>
</div>
<div class="flex w-full flex-col gap-4">
<label class="flex flex-col w-full flex-1">
<p class="text-white text-sm font-medium leading-normal pb-2">Email or Username</p>
<div class="flex w-full flex-1 items-stretch rounded-lg bg-slate-800 dark:bg-slate-800 ring-1 ring-transparent focus-within:ring-primary">
<div class="text-slate-400 flex items-center justify-center pl-4">
<span class="material-symbols-outlined">person</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-white focus:outline-0 focus:ring-0 border-none bg-transparent h-14 placeholder:text-slate-500 p-4 text-base font-normal leading-normal" placeholder="Enter your email or username" type="text" value=""/>
</div>
</label>
<label class="flex flex-col w-full flex-1">
<p class="text-white text-sm font-medium leading-normal pb-2">Password</p>
<div class="flex w-full flex-1 items-stretch rounded-lg bg-slate-800 dark:bg-slate-800 ring-1 ring-transparent focus-within:ring-primary">
<div class="text-slate-400 flex items-center justify-center pl-4">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-white focus:outline-0 focus:ring-0 border-none bg-transparent h-14 placeholder:text-slate-500 p-4 pr-2 text-base font-normal leading-normal" placeholder="Enter your password" type="password" value=""/>
<button aria-label="Toggle password visibility" class="text-slate-400 flex items-center justify-center px-4 hover:text-white">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</label>
<p class="text-primary hover:text-primary/80 text-sm font-normal leading-normal self-end underline cursor-pointer">Forgot Password?</p>
</div>
<button class="flex h-14 w-full items-center justify-center rounded-lg bg-primary px-6 text-base font-bold text-white shadow-lg shadow-primary/20 transition-colors hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background-dark">Login</button>
</div>
</div>
</div>
</div>
</body></html>
